# T5 (spec 001) — the long-running release job on the GitHub Actions runner.
# P1 (Substrate): the heavy LangGraph work runs HERE, never in the Vercel app. The job
# boots release_intelligence_graph's single pass-through node, which flips the run
# running -> completed and writes langgraph_thread_id back to Aurora.
#
# Hardened runner (github-rules): least-privilege token (id-token for OIDC + read-only
# contents only), pinned actions, no long-lived AWS keys — credentials come from an
# OIDC-assumed role. The DB DSN is injected from a secret, never hardcoded.

name: release-run

on:
  workflow_dispatch:
    inputs:
      release_run_id:
        description: 'UUID of the pre-inserted release_runs row'
        required: true
        type: string
      repo:
        description: 'owner/repo the run targets'
        required: false
        type: string
      base_ref:
        description: 'compare base ref'
        required: false
        type: string
      head_ref:
        description: 'compare head ref'
        required: false
        type: string
      resume_decision:
        description: 'Gate #1 decision to resume a halted run (approved|rejected|edited)'
        required: false
        type: string
      thread_id:
        description: 'LangGraph thread to resume (PRD §5.6 — same thread_id)'
        required: false
        type: string

# Least privilege: OIDC token to assume the AWS role + read the repo. Nothing else.
permissions:
  id-token: write
  contents: read

# One in-flight job per release run; a re-dispatch supersedes rather than racing.
concurrency:
  group: release-run-${{ inputs.release_run_id }}
  cancel-in-progress: false

jobs:
  run:
    name: Advance release run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install worker runtime
        run: pip install -r worker/requirements.txt

      - name: Assume AWS role via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_RELEASE_RUN_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run release_intelligence_graph
        env:
          # DSN is a secret (Aurora endpoint via RDS Proxy). Never echoed; the worker
          # reads it from env and enforces TLS.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Read-only token the evidence collector uses for the compare API
          # (github-rules: server-side only, never argv/logs). The built-in job token
          # is scoped to this repo by the `contents: read` permission above.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Private S3 bucket for redacted evidence blobs (a name, not a secret; the
          # worker writes via the OIDC-assumed role, never long-lived keys).
          EVIDENCE_BUCKET: ${{ vars.EVIDENCE_BUCKET }}
          # Bedrock Converse model + the PUBLISHED Guardrail the clustering node attaches
          # (constitution §5: a Guardrail is mandatory). Model id is config, not a secret;
          # the guardrail id/version come from repo vars.
          BEDROCK_MODEL_ID: ${{ vars.BEDROCK_MODEL_ID }}
          BEDROCK_GUARDRAIL_ID: ${{ vars.BEDROCK_GUARDRAIL_ID }}
          BEDROCK_GUARDRAIL_VERSION: ${{ vars.BEDROCK_GUARDRAIL_VERSION }}
          # Used to build the Gate #1 interrupt payload's dashboard_url (PRD §5.6).
          DASHBOARD_BASE_URL: ${{ vars.DASHBOARD_BASE_URL }}
          PYTHONPATH: worker/src
        # The resume args are empty on an initial run (the worker halts at Gate #1) and
        # carry the recorded decision + thread on a resume dispatch (spec 004 T6).
        run: |
          python -m release_worker \
            --release-run-id "${{ inputs.release_run_id }}" \
            ${{ inputs.resume_decision && format('--resume-decision {0} --thread-id {1}', inputs.resume_decision, inputs.thread_id) || '' }}
