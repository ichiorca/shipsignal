name: Deploy to Vercel (production)

# Auto-deploy the latest main to Vercel production on every push (and on demand).
# This replaces the manual `vercel --prod` step: the Vercel project here is NOT wired to
# Vercel's native Git integration, so this workflow is what keeps production in sync with main.
#
# Required GitHub secrets (set via `gh secret set`):
#   VERCEL_TOKEN       — a Vercel access token (vercel.com/account/tokens), scoped to the team
#   VERCEL_ORG_ID      — team_tkkqXRJtyzq0R4542ddf5pYo
#   VERCEL_PROJECT_ID  — prj_2LxXpBjI8ScMFDOIVW9nY7hQKphB

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# One production deploy at a time; newer pushes supersede in-flight ones.
concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings + env (production)
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build (production)
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
